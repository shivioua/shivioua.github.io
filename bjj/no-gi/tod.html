<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BJJ – Technique #${id}</title>
  <meta name="description" content="Daily BJJ No-Gi technique — one number, one link, one goal." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #f5c518;
      --dark:   #0a0a0a;
      --border: #252525;
      --muted:  #888888;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── HEADER ── */
    .hdr {
      position: fixed; inset: 0 0 auto 0; z-index: 100;
      padding: 0.9rem 1.4rem;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: linear-gradient(to bottom, rgba(0,0,0,.95) 60%, transparent);
    }
    .hdr .acc { color: var(--yellow); }

    /* ── LAYOUT ── */
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      width: min(92vw, 660px);
      padding: 5rem 0 2rem;
    }

    hr {
      width: 100%;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── TECHNIQUE NUMBER ── */
    .num-link {
      display: block;
      font-size: clamp(7rem, 28vw, 22rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--yellow);
      text-decoration: none;
      text-align: center;
      transition: opacity .18s;
    }
    .num-link:hover { opacity: 0.65; }

    /* ── NEXT BUTTON ── */
    .btn-next {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1.5rem;
      border: 1.5px solid var(--yellow); border-radius: 99px;
      background: transparent; color: var(--yellow);
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.06em;
      cursor: pointer; transition: background .18s, color .18s;
    }
    .btn-next:hover { background: var(--yellow); color: #000; }

    /* ── ERROR ── */
    .err { color: var(--muted); font-size: 0.88rem; text-align: center; }
  </style>
</head>
<body>

<header class="hdr">BJJ Techniques (<span id="tech-count"></span>)</header>

<div class="wrap" id="wrap">
  <span style="color:#444;font-size:.8rem;letter-spacing:.1em">Loading…</span>
</div>

<script src="tod-cfg.js"></script>
<script>
  // Validate URL — only allow http/https to prevent XSS
  function safeURL(raw) {
    try {
      const u = new URL(String(raw));
      return /^https?:$/.test(u.protocol) ? raw : '';
    } catch { return ''; }
  }

  const list = Array.isArray(window.TOD_CONFIG?.techniques)
    ? window.TOD_CONFIG.techniques : [];

  document.getElementById('tech-count').textContent = list.length;

  const wrap = document.getElementById('wrap');

  if (!list.length) {
    wrap.innerHTML = '<p class="err">No techniques configured.</p>';
  } else {
    const pick = list[Math.floor(Math.random() * list.length)];
    const href = safeURL(pick.url || '');
    const id   = Number(pick.id);

    wrap.innerHTML = `
      <button class="btn-next" onclick="location.reload()" title="Load another random technique">Next ↻</button>
      <hr>
      ${href
        ? `<a class="num-link" href="${href}" target="_blank" rel="noopener">#${id}</a>`
        : `<span class="num-link" style="cursor:default">#${id}</span>`
      }
      <hr>
      <button class="btn-next" onclick="location.reload()" title="Load another random technique">Next ↻</button>
    `;
  }
</script>

</body>
</html>
