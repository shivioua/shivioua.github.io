<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BJJ NO-GI – Technique Of The Day</title>
  <meta name="description" content="Daily BJJ No-Gi technique — scroll through, study, improve." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:  #f5c518;
      --yellow2: #ffd740;
      --dark:    #0a0a0a;
      --card:    #111111;
      --border:  #252525;
      --text:    #ffffff;
      --muted:   #888888;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.5;
    }

    /* ── HEADER ── */
    .hdr {
      position: fixed; inset: 0 0 auto 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.4rem 1.8rem;
      background: linear-gradient(to bottom, rgba(0,0,0,.96) 55%, transparent);
    }
    .hdr-title {
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .hdr-title .acc { color: var(--yellow); }
    .badge {
      font-size: 0.68rem; font-weight: 700;
      background: var(--yellow); color: #000;
      padding: 0.22rem 0.6rem; border-radius: 99px;
      letter-spacing: 0.03em;
    }

    /* ── FEED ── */
    #feed {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    /* ── SLIDE ── */
    .slide {
      height: 100vh; scroll-snap-align: start;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4.5rem 1.25rem 3rem;
    }
    .slide-inner {
      width: 100%; max-width: 820px;
      display: flex; flex-direction: column; gap: 0.9rem;
    }
    .slide-meta {
      display: flex; align-items: center; gap: 0.55rem;
      font-size: 0.7rem; color: var(--muted); letter-spacing: 0.07em;
    }
    .today-pip {
      font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
      background: var(--yellow); color: #000;
      padding: 0.12rem 0.45rem; border-radius: 3px;
    }
    .slide-name {
      font-size: clamp(1.05rem, 2.6vw, 1.5rem);
      font-weight: 700; line-height: 1.3;
      color: var(--text);
    }
    .slide-name a {
      color: var(--text); text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color .2s, border-color .2s;
    }
    .slide-name a:hover {
      color: var(--yellow); border-color: var(--yellow);
    }

    /* ── VIDEO ── */
    .video-wrap {
      width: 100%; aspect-ratio: 16 / 9;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    .video-wrap.vertical { aspect-ratio: 9 / 16; max-height: 70vh; width: auto; margin: 0 auto; }
    .no-video {
      height: 100%; display: flex; align-items: center; justify-content: center;
      color: #444; font-size: 0.82rem; letter-spacing: 0.04em;
    }
    .ext-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; height: 100%; text-decoration: none; color: var(--text);
      transition: border-color .2s;
    }
    .ext-card:hover { border-color: var(--yellow); }
    .ext-card .ext-icon { font-size: 3rem; }
    .ext-card .ext-label {
      font-size: 0.9rem; font-weight: 600; color: var(--yellow);
      border: 1px solid var(--yellow); border-radius: 99px;
      padding: 0.4rem 1.2rem; transition: background .2s, color .2s;
    }
    .ext-card:hover .ext-label { background: var(--yellow); color: #000; }
    .ext-card .ext-note { font-size: 0.72rem; color: var(--muted); }

    /* ── TAGS ── */
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag {
      font-size: 0.77rem; color: var(--yellow2);
      background: rgba(255,215,64,.07);
      border: 1px solid rgba(255,215,64,.18);
      padding: 0.17rem 0.52rem; border-radius: 99px;
    }

    /* ── SIDE DOTS ── */
    #dots {
      position: fixed; right: 0.85rem; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 5px; z-index: 200;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--border); cursor: pointer;
      transition: background .2s, transform .2s;
    }
    .dot.on { background: var(--yellow); transform: scale(1.6); }

    /* ── SCROLL HINT ── */
    #hint {
      position: fixed; bottom: 1.1rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em;
      pointer-events: none; z-index: 200;
      animation: bob 2s ease-in-out infinite;
      transition: opacity .8s;
    }
    @keyframes bob {
      0%, 100% { opacity: .5; transform: translateX(-50%) translateY(0); }
      50%       { opacity: 1;  transform: translateX(-50%) translateY(-4px); }
    }

    /* ── LOADING / ERROR ── */
    #root {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; text-align: center; padding: 2rem;
    }
    .msg-title { color: var(--yellow); font-size: 1.15rem; margin-bottom: .7rem; }
    .msg-body  { color: var(--muted); font-size: .86rem; line-height: 1.7; }
    .msg-body code { color: var(--yellow); font-size: .9em; }

    /* ── NEXT BUTTON ── */
    .btn-next {
      display: inline-flex; align-items: center; gap: 0.4rem;
      margin-top: 0.3rem; align-self: flex-start;
      padding: 0.45rem 1.3rem;
      border: 1.5px solid var(--yellow); border-radius: 99px;
      background: transparent; color: var(--yellow);
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.05em;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .btn-next:hover { background: var(--yellow); color: #000; }

    @media (max-width: 520px) { #dots { display: none; } }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">BJJ <span class="acc">NO-GI</span> · Technique Of The Day</div>
  <span class="badge" id="date-badge"></span>
</header>

<div id="root">
  <span style="color:#555;font-size:.82rem;letter-spacing:.12em">Loading…</span>
</div>

<nav id="dots" aria-label="Technique navigation"></nav>

<p id="hint">↕ scroll to browse all</p>

<script src="tod-cfg.js"></script>
<script>
  // Date badge
  document.getElementById('date-badge').textContent =
    new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

  // Escape HTML to prevent XSS
  const esc = s => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');

  // Validate embed URLs — only allow http/https
  function safeURL(raw) {
    try {
      const u = new URL(String(raw));
      return /^https?:$/.test(u.protocol) ? raw : '';
    } catch { return ''; }
  }

  // Normalise any YouTube URL into its embed form
  function toEmbedURL(raw) {
    try {
      const u = new URL(String(raw));
      let vid = '';
      // youtube.com/watch?v=ID
      if (u.hostname.includes('youtube.com') && u.searchParams.has('v')) {
        vid = u.searchParams.get('v');
      }
      // youtube.com/embed/ID (already correct)
      else if (u.hostname.includes('youtube.com') && u.pathname.startsWith('/embed/')) {
        return raw;
      }
      // youtu.be/ID
      else if (u.hostname === 'youtu.be') {
        vid = u.pathname.slice(1).split('/')[0];
      }
      if (vid) return `https://www.youtube.com/embed/${vid}`;
    } catch { /* fall through */ }
    return raw;
  }

  // Derive a "watch" URL from an embed URL (for the title link)
  function watchURL(raw) {
    try {
      const u = new URL(String(raw));
      // YouTube embed → normal watch link
      const ytMatch = u.pathname.match(/^\/embed\/([\w-]+)/);
      if (ytMatch && u.hostname.includes('youtube')) {
        return `https://www.youtube.com/watch?v=${ytMatch[1]}`;
      }
      // Vimeo embed → normal link
      const vmMatch = u.pathname.match(/^\/video\/(\d+)/);
      if (vmMatch && u.hostname.includes('vimeo')) {
        return `https://vimeo.com/${vmMatch[1]}`;
      }
    } catch { /* fall through */ }
    return raw; // Instagram, Facebook, etc. — use as-is
  }

  // Detect vertical embed sources (Instagram reels)
  function isVerticalEmbed(url) {
    return /instagram\.com/i.test(url);
  }

  // Facebook blocks iframe embedding (X-Frame-Options: deny)
  function isFacebookURL(url) {
    return /facebook\.com/i.test(url);
  }

  // Clean Facebook URL for linking (strip /embed/ suffix)
  function fbWatchURL(raw) {
    return raw.replace(/\/embed\/?$/, '');
  }

  function init() {
    const root   = document.getElementById('root');
    const dotsEl = document.getElementById('dots');
    const hintEl = document.getElementById('hint');

    const cfg = window.TOD_CONFIG;
    if (!cfg) {
      root.innerHTML = `<div>
        <p class="msg-title">⚠ Could not load config</p>
        <p class="msg-body">Make sure <code>tod-cfg.js</code> is in the same directory as this page.</p>
      </div>`;
      hintEl.style.display = 'none';
      return;
    }

    const list = Array.isArray(cfg?.techniques) ? cfg.techniques : [];
    if (!list.length) {
      root.innerHTML = `<div>
        <p class="msg-title">No techniques found</p>
        <p class="msg-body">Add at least one entry to <code>tod-cfg.js</code>.</p>
      </div>`;
      hintEl.style.display = 'none';
      return;
    }

    // Pick a random technique on every page load
    const pickIdx = Math.floor(Math.random() * list.length);

    // Build the feed
    const feed = document.createElement('div');
    feed.id = 'feed';

    list.forEach((t, i) => {
      const isToday  = i === pickIdx;
      const src      = safeURL(toEmbedURL(t.url || ''));
      const fb       = src && isFacebookURL(src);
      const href     = src ? (fb ? fbWatchURL(src) : watchURL(src)) : '';
      const vertical = src && !fb && isVerticalEmbed(src);
      const tagsHTML = (t.tags || []).map(tg => `<span class="tag">${esc(tg)}</span>`).join('');
      const nameHTML = href
        ? `<a href="${esc(href)}" target="_blank" rel="noopener">${esc(t.name || 'Unnamed technique')}</a>`
        : esc(t.name || 'Unnamed technique');

      let videoHTML;
      if (fb && href) {
        // Facebook blocks iframes — show a styled link card instead
        videoHTML = `<a class="ext-card" href="${esc(href)}" target="_blank" rel="noopener">
          <span class="ext-icon">▶</span>
          <span class="ext-label">Watch on Facebook</span>
          <span class="ext-note">Facebook does not allow embedding — opens in new tab</span>
        </a>`;
      } else if (src) {
        videoHTML = `<iframe
          src="${src}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="${esc(t.name || '')}"></iframe>`;
      } else {
        videoHTML = `<div class="no-video">No valid embed URL provided</div>`;
      }

      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.i = i;
      slide.innerHTML = `
        <div class="slide-inner">
          <div class="slide-meta">
            ${isToday ? "<span class='today-pip'>Today's Pick</span>" : ''}
            <span>${i + 1} / ${list.length}</span>
          </div>
          <p class="slide-name">${nameHTML}</p>
          <div class="video-wrap${vertical ? ' vertical' : ''}">
            ${videoHTML}
          </div>
          <div class="tags">${tagsHTML}</div>
          <button class="btn-next" onclick="location.reload()" title="Load another random technique">Next ↻</button>
        </div>`;
      feed.appendChild(slide);

      // Progress dot
      const dot = document.createElement('div');
      dot.className = 'dot' + (isToday ? ' on' : '');
      dot.title = t.name || `Technique ${i + 1}`;
      dot.dataset.i = i;
      dot.addEventListener('click', () =>
        feed.children[i].scrollIntoView({ behavior: 'smooth' })
      );
      dotsEl.appendChild(dot);
    });

    // Hide dots if list is very long
    if (list.length > 20) dotsEl.style.display = 'none';

    // Swap loading screen for feed
    root.replaceWith(feed);

    // Scroll instantly to today's pick (disable snap momentarily to avoid fighting it)
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const target = feed.children[pickIdx];
      if (!target) return;
      feed.style.scrollSnapType = 'none';
      feed.scrollTop = target.offsetTop;
      requestAnimationFrame(() => { feed.style.scrollSnapType = 'y mandatory'; });
    }));

    // Hide scroll hint after 4 s
    setTimeout(() => { hintEl.style.opacity = '0'; }, 4000);

    // Update active dot as user scrolls through slides
    const allDots = dotsEl.querySelectorAll('.dot');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.intersectionRatio >= 0.5) {
          const idx = parseInt(e.target.dataset.i);
          allDots.forEach((d, j) => d.classList.toggle('on', j === idx));
        }
      });
    }, { root: feed, threshold: 0.5 });

    feed.querySelectorAll('.slide').forEach(s => io.observe(s));
  }

  init();
</script>

</body>
</html>
