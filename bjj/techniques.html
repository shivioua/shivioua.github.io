<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BJJ Techniques</title>
  <meta name="description" content="Daily BJJ No-Gi technique — one number, one link, one goal." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #f5c518;
      --dark:   #0a0a0a;
      --border: #252525;
      --muted:  #888888;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── HEADER ── */
    .hdr {
      position: fixed; inset: 0 0 auto 0; z-index: 100;
      padding: 0.9rem 1.4rem;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-align: center;
      background: linear-gradient(to bottom, rgba(0,0,0,.95) 60%, transparent);
    }
    .hdr .acc { color: var(--yellow); }
    .hdr a { color: var(--yellow); text-decoration: none; }
    .hdr a:hover { text-decoration: underline; }

    /* ── LAYOUT ── */
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      width: min(92vw, 660px);
      padding: 5rem 0 2rem;
    }

    hr {
      width: 100%;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── TECHNIQUE NUMBER ── */
    .num-link {
      display: block;
      font-size: clamp(7rem, 28vw, 22rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--yellow);
      text-decoration: none;
      text-align: center;
      transition: opacity .18s;
    }
    .num-link:hover { opacity: 0.65; }

    /* ── NEXT BUTTON ── */
    .btn-next {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1.5rem;
      border: 1.5px solid var(--yellow); border-radius: 99px;
      background: transparent; color: var(--yellow);
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.06em;
      cursor: pointer; transition: background .18s, color .18s;
    }
    .btn-next:hover { background: var(--yellow); color: #000; }

    /* ── ERROR ── */
    .err { color: var(--muted); font-size: 0.88rem; text-align: center; }

    /* ── FOOTER ── */
    .ftr {
      position: fixed; inset: auto 0 0 0;
      text-align: center;
      padding: 0.55rem 1rem;
      font-size: 0.65rem; color: var(--muted); letter-spacing: 0.05em;
      background: linear-gradient(to top, rgba(0,0,0,.92) 60%, transparent);
      pointer-events: none;
    }
    .ftr a { pointer-events: all; color: var(--yellow); text-decoration: none; }
    .ftr a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header class="hdr"><a href="./techniques.html">BJJ Techniques</a> (<span id="tech-count"></span>)</header>

<div class="wrap" id="wrap">
  <span style="color:#444;font-size:.8rem;letter-spacing:.1em">Loading…</span>
</div>

<footer class="ftr"><a href="https://shivioua.github.io" target="_blank" rel="noopener noreferrer">&copy; Shivioua</a> &nbsp;&middot;&nbsp; last update: <span id="last-update"></span></footer>

<noscript><p style="color:#888;text-align:center;padding:2rem">JavaScript is required to use this page.</p></noscript>

<script src="techniques-cfg.js"></script>
<script>
  // Validate URL — only allow http/https to prevent XSS
  function safeURL(raw) {
    try {
      const u = new URL(String(raw));
      return /^https?:$/.test(u.protocol) ? raw : '';
    } catch { return ''; }
  }

  const list = Array.isArray(window.TOD_CONFIG?.techniques)
    ? window.TOD_CONFIG.techniques : [];

  document.getElementById('tech-count').textContent = list.length;
  document.getElementById('last-update').textContent = window.TOD_CONFIG?.lastUpdate ?? '';

  const wrap = document.getElementById('wrap');

  if (!list.length) {
    wrap.innerHTML = '<p class="err">No techniques configured.</p>';
  } else {
    const requestedId = new URLSearchParams(location.search).get('id');
    const pick = requestedId
      ? (list.find(t => String(t.id) === requestedId) ?? list[Math.floor(Math.random() * list.length)])
      : list[Math.floor(Math.random() * list.length)];
    const href = safeURL(pick.url || '');
    const id   = Number(pick.id);

    // Set page title dynamically
    document.title = `BJJ Technique #${id}`;

    // Build elements via DOM API to avoid HTML injection via URL
    const btnNext = () => {
      const b = document.createElement('button');
      b.className = 'btn-next';
      b.title = 'Load another random technique';
      b.textContent = 'Random ↻';
      b.addEventListener('click', () => location.reload());
      return b;
    };

    const numEl = document.createElement(href ? 'a' : 'span');
    numEl.className = 'num-link';
    numEl.textContent = `#${id}`;
    if (href) {
      numEl.href = href;
      numEl.target = '_blank';
      numEl.rel = 'noopener noreferrer';
    } else {
      numEl.style.cursor = 'default';
    }

    const hr1 = document.createElement('hr');
    const hr2 = document.createElement('hr');

    wrap.innerHTML = '';
    if (!requestedId) wrap.appendChild(btnNext());
    wrap.appendChild(hr1);
    wrap.appendChild(numEl);
    wrap.appendChild(hr2);
    if (!requestedId) wrap.appendChild(btnNext());
  }
</script>

</body>
</html>
